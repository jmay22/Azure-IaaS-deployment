  <text x="637" y="397" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Name:</text>
  <text x="690" y="397" font-size="9" fill="#c9d1d9" font-family="'Courier New', monospace">Allow-Web-Subnet</text>
  <text x="637" y="413" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Source:</text>
  <text x="690" y="413" font-size="9" fill="#c9d1d9" font-family="'Courier New', monospace">10.0.1.0/24</text>
  <text x="637" y="429" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Port:</text>
  <text x="690" y="429" font-size="9" fill="#c9d1d9" font-family="'Courier New', monospace">* (Any)</text>
  <text x="637" y="445" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Action:</text>
  <rect x="688" y="436" width="40" height="14" rx="4" fill="#0d3a1a"/>
  <text x="708" y="446" text-anchor="middle" font-size="8.5" fill="#2ea043" font-weight="700" font-family="'Courier New', monospace">ALLOW</text>
  <text x="637" y="461" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Priority:</text>
  <text x="690" y="461" font-size="9" fill="#c9d1d9" font-family="'Courier New', monospace">100</text>
  <text x="637" y="477" font-size="9" fill="#6b7a8d" font-family="'Courier New', monospace">Applied to:</text>
  <text x="700" y="477" font-size="9" fill="#58a6ff" font-family="'Courier New', monospace">vm-db-01 NIC</text>

