  <text x="244" y="525" font-size="9.5" fill="#8a9db5"><tspan font-weight="700" fill="#4a90d9" font-family="'Courier New', monospace">Network: </tspan>10.0.0.0/16 VNet</text>

  <rect x="406" y="508" width="155" height="26" rx="13" fill="#0d1a28" stroke="#1c3050" stroke-width="1"/>
  <circle cx="422" cy="521" r="4" fill="#f6993f"/>
  <text x="432" y="525" font-size="9.5" fill="#8a9db5"><tspan font-weight="700" fill="#4a90d9" font-family="'Courier New', monospace">Pattern: </tspan>Jump Host</text>

